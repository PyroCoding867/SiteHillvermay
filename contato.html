<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/contato.css">
    <title>Hillvermay - Contato</title>
</head>
<body class="contato">
    <nav>
        <a href="/index.html">Início</a>
        <a href="/sobre.html">Sobre o jogo</a>
        <a href="/features.html">O que teremos no jogo</a>
        <a href="/roadmap.html">Linha de desenvolvimento</a>
    </nav><br>

    <div class="formulario">
        <h1>Contato</h1>
        <p>Preencha o formulário abaixo para entrar em contato conosco. Alguma sugestão ou dúvida? Não hesite em nos escrever!</p>

        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="assunto">Assunto:</label>
            <select id="assunto" name="assunto" required>
                <option value="">Selecione um assunto</option>
                <option value="sugestao">Sugestão</option>
                <option value="duvida">Dúvida</option>
                <option value="outro">Outro</option>
            </select><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" required></textarea><br><br>

            <button type="submit">Enviar</button>
        </form>
        <footer>
            <p>Copyright © 2026 PyroPyer867. Todos os direitos reservados.</p>
        </footer>
    </div>
</body>
</html>
